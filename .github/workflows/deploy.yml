name: Deploy Laravel Vue to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Mengeksekusi Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 50008
          command_timeout: 30m # Menambahkan batas waktu agar tidak timeout saat npm build
          script_stop: true # Menghentikan script langsung jika ada command yang gagal (error)
          script: |
            # 1. Pindah ke direktori web
            cd /home/avenir/public_html

            # 2. Tarik kode terbaru dari branch master
            git fetch --all
            git reset --hard origin/master

            # 3. Update library PHP (Kembalikan normal, hapus ignore-platform)
            composer install --no-interaction --prefer-dist --optimize-autoloader

            # 4. Compile frontend Vue
            rm -rf node_modules
            npm install
            npm run build

            # 5. Jalankan migrasi database & command terkait
            php artisan migrate --force
            php artisan optimize:clear
            php artisan view:clear
            php artisan queue:restart
            php artisan market:fetch || true
            php artisan sectors:sync || true

            # 6. Pastikan symlink storage terbuat
            php artisan storage:link || true

            # 7. Rapikan kembali hak akses
            chown -R avenir:avenir /home/avenir/public_html
            chmod -R 775 /home/avenir/public_html/storage /home/avenir/public_html/bootstrap/cache
